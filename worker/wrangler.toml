name = "pv-tracker-api"
main = "index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Set these with:
#   wrangler secret put TURSO_URL
#   wrangler secret put TURSO_AUTH_TOKEN
#
# TURSO_URL looks like: libsql://your-db-name-yourorg.turso.io
# TURSO_AUTH_TOKEN comes from: turso db tokens create <db-name>
#
# [vars] can hold non-secret config; keep secrets out of this file.
